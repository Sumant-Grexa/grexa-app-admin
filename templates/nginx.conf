server {
    server_name {serverName};
    root {webRoot};

    location /health {
        return 200 "It works!\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.js$ {
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    # Serve apple-app-site-association to enable deeplinking to app if link opened in browser
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        root /var/www/preprod-app;
        try_files $uri =404;
    }

    location = /.well-known/assetlinks.json {
        default_type application/json;
        root /var/www/preprod-app;
        try_files $uri =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/{serverName}/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/{serverName}/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = {serverName}) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name {serverName};
    return 404; # managed by Certbot
}
