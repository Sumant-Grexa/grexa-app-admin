<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grexa Deployer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login-screen" class="screen">
    <div class="login-box">
      <div class="login-logo">
        <span class="logo-mark">G</span>
        <div class="login-title">
          <span class="brand">GREXA</span>
          <span class="sub">Deploy Control</span>
        </div>
      </div>
      <form id="login-form">
        <div class="field">
          <input type="password" id="password-input" placeholder="Enter deploy password" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary">Unlock →</button>
        <p id="login-error" class="error-msg hidden">Wrong password. Try again.</p>
      </form>
    </div>
  </div>

  <div id="app-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <span class="logo-mark sm">G</span>
        <span class="brand">GREXA</span>
        <span class="header-sep">/</span>
        <span class="header-label">Deploy Control</span>
      </div>
      <div class="header-right">
        <span id="header-status-dot" class="status-dot idle"></span>
        <button id="refresh-btn" class="btn-ghost" title="Refresh status">↻ Refresh</button>
        <button id="logout-btn" class="btn-ghost dim">Logout</button>
      </div>
    </header>

    <main>
      <div class="env-grid" id="env-grid">
        <!-- Cards injected by JS -->
      </div>

      <div id="log-panel" class="log-panel hidden">
        <div class="log-header">
          <span id="log-title">Deploy Log</span>
          <button class="btn-ghost dim" id="close-log">✕ Close</button>
        </div>
        <pre id="log-output" class="log-output"></pre>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
